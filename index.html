<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Gerador QR Unaí Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background: #f9fafb; }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        /* Switch */
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4f46e5; }
        input:checked + .slider:before { transform: translateX(20px); }

        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
    </style>
</head>
<body class="text-gray-900 min-h-screen">

    <div class="max-w-md mx-auto min-h-screen flex flex-col p-6 pb-24">
        
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-2xl font-black text-indigo-600 tracking-tight">QR Generator</h1>
                <p class="text-[10px] text-gray-400 font-bold uppercase tracking-widest">Entrega & UID Tracking</p>
            </div>
            <div class="bg-indigo-100 p-3 rounded-2xl text-indigo-600">
                <i data-lucide="scan-line" class="w-6 h-6"></i>
            </div>
        </header>

        <div class="mb-6 p-4 bg-indigo-600 rounded-3xl shadow-lg shadow-indigo-200">
            <div class="flex items-center justify-between text-white mb-3">
                <span class="text-xs font-bold uppercase tracking-wider opacity-80">Leitor (Mock MVP)</span>
                <i data-lucide="camera" class="w-4 h-4"></i>
            </div>
            <button onclick="simulateScan()" class="w-full py-3 bg-white/10 hover:bg-white/20 border border-white/20 rounded-2xl text-white font-bold text-sm transition-all flex items-center justify-center gap-2">
                <i data-lucide="qr-code" class="w-4 h-4"></i> SIMULAR LEITURA DE UID
            </button>
        </div>

        <div class="bg-white rounded-[2.5rem] p-6 shadow-sm border border-gray-100 mb-6">
            <form id="qrForm" class="space-y-4">
                
                <div class="relative">
                    <label class="text-[10px] font-black text-gray-400 uppercase ml-2 mb-1 block">Cliente</label>
                    <input type="text" id="cliente" placeholder="Nome do Cliente" 
                           oninput="filterClientes()" onfocus="showClientes()"
                           class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold" autocomplete="off" required>
                    <ul id="clientes-suggestions" class="absolute left-0 right-0 mt-2 bg-white border border-gray-100 shadow-2xl rounded-2xl max-h-48 overflow-y-auto z-50 hidden custom-scroll"></ul>
                </div>

                <input type="text" id="rua" placeholder="Rua e Complemento" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium" required>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="relative">
                        <input type="text" id="bairro" placeholder="Bairro" oninput="filterBairros()" onfocus="showBairros()" 
                               class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium" autocomplete="off" required>
                        <ul id="bairros-suggestions" class="absolute left-0 right-0 mt-2 bg-white border border-gray-100 shadow-xl rounded-2xl max-h-48 overflow-y-auto z-50 hidden custom-scroll"></ul>
                    </div>
                    <input type="text" id="numero" placeholder="Nº" class="p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium" required>
                </div>

                <input type="tel" id="telefone" placeholder="Telefone (WhatsApp)" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium" required>

                <div class="flex items-center justify-between p-4 bg-indigo-50/50 rounded-2xl border border-indigo-100/50">
                    <div class="flex items-center gap-2 text-indigo-900 font-semibold">
                        <i data-lucide="clock" class="w-4 h-4"></i>
                        <span class="text-sm">Agendar horário?</span>
                    </div>
                    <label class="switch">
                        <input type="checkbox" id="toggle-horario" onchange="toggleTimeInput()">
                        <span class="slider"></span>
                    </label>
                </div>

                <div id="time-container" class="hidden animate-fade-in">
                    <input type="datetime-local" id="horario" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium">
                </div>

                <button type="submit" class="w-full py-5 bg-indigo-600 text-white font-black text-lg rounded-2xl shadow-xl active:scale-[0.97] transition-all flex items-center justify-center gap-2">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i> SALVAR E GERAR UID
                </button>
            </form>
        </div>

        <div id="result-area" class="hidden animate-fade-in flex flex-col items-center">
            <div class="bg-white p-8 rounded-[2.5rem] shadow-2xl border border-indigo-50 mb-6 flex flex-col items-center w-full text-center">
                <canvas id="qrcode-canvas" class="mb-4"></canvas>
                <div id="uid-tag" class="px-4 py-1 bg-gray-100 rounded-full text-[10px] font-mono font-bold text-gray-500 mb-4"></div>
                <p id="printing-msg" class="text-indigo-600 font-black text-sm uppercase">Etiqueta Pronta!</p>
            </div>
            
            <button onclick="resetForm()" class="px-6 py-4 bg-gray-100 text-gray-500 font-bold rounded-2xl text-sm flex items-center gap-2">
                <i data-lucide="refresh-cw" class="w-4 h-4"></i> LIMPAR TELA
            </button>
        </div>

    </div>

    <script>
        const bairrosUnai = ["Água Branca","Água Branca II","Águas Claras","Amaral","Área Rural de Unaí","Bela Vista","Boa Vista","Cachoeira","Canabrava","Cangalha","Capim Branco","Centro","Cidade Nova","Cruzeiro","De Lourdes","Divinéia","Dom Bosco","Floresta","Industrial","Iuna","Jacilândia","Kamayura","Laguna","Mamoeiro","Nossa Senhora do Carmo","Nova Canaã","Nova Divinéia","Novo Horizonte","Novo Jardim","Politécnica","Primavera","Riviera Park","Sagarana","Santa Clara","Serenata","Vale Verde","Vila do Sol","Vila Militar"];

        let savedClientes = JSON.parse(localStorage.getItem('saved_customers')) || [];

        // Gerador de UID
        const generateUID = () => 'UID-' + Math.random().toString(36).substr(2, 6).toUpperCase();

        function toggleTimeInput() {
            const container = document.getElementById('time-container');
            container.classList.toggle('hidden', !document.getElementById('toggle-horario').checked);
        }

        // Simulação de Leitura (Mock)
        function simulateScan() {
            if (savedClientes.length === 0) {
                alert("Nenhum cliente no banco de dados para simular leitura.");
                return;
            }
            
            // Pega um UID aleatório do seu banco local para simular que escaneou um físico
            const randomClient = savedClientes[Math.floor(Math.random() * savedClientes.length)];
            const scannedUID = randomClient.uid;

            alert("QR Code Escaneado com Sucesso! ID: " + scannedUID);
            
            // Lógica de preenchimento após "leitura"
            const client = savedClientes.find(c => c.uid === scannedUID);
            if(client) {
                document.getElementById('cliente').value = client.nome;
                document.getElementById('rua').value = client.rua;
                document.getElementById('bairro').value = client.bairro;
                document.getElementById('numero').value = client.numero;
                document.getElementById('telefone').value = client.telefone;
                
                // Feedback visual de sucesso
                const header = document.querySelector('header');
                header.classList.add('animate-pulse');
                setTimeout(() => header.classList.remove('animate-pulse'), 1000);
            }
        }

        // Sugestões de Clientes
        function showClientes() {
            const list = document.getElementById('clientes-suggestions');
            list.classList.remove('hidden');
            filterClientes();
        }

        function filterClientes() {
            const input = document.getElementById('cliente').value.toLowerCase();
            const list = document.getElementById('clientes-suggestions');
            const filtered = savedClientes.filter(c => c.nome.toLowerCase().includes(input));
            
            if(filtered.length === 0) { list.classList.add('hidden'); return; }

            list.innerHTML = filtered.map(c => `
                <li onclick="fillByUID('${c.uid}')" class="p-4 hover:bg-indigo-50 border-b border-gray-50 text-sm font-bold cursor-pointer flex justify-between items-center active:bg-indigo-100">
                    <div>
                        <p class="text-gray-900">${c.nome}</p>
                        <p class="text-[10px] text-indigo-500 uppercase font-black">${c.uid} • ${c.bairro}</p>
                    </div>
                </li>
            `).join('');
            list.classList.remove('hidden');
        }

        function fillByUID(uid) {
            const client = savedClientes.find(c => c.uid === uid);
            if(client) {
                document.getElementById('cliente').value = client.nome;
                document.getElementById('rua').value = client.rua;
                document.getElementById('bairro').value = client.bairro;
                document.getElementById('numero').value = client.numero;
                document.getElementById('telefone').value = client.telefone;
            }
            document.getElementById('clientes-suggestions').classList.add('hidden');
        }

        // Sugestões de Bairros
        function showBairros() {
            const list = document.getElementById('bairros-suggestions');
            list.classList.remove('hidden');
            filterBairros();
        }

        function filterBairros() {
            const input = document.getElementById('bairro').value.toLowerCase();
            const list = document.getElementById('bairros-suggestions');
            const filtered = bairrosUnai.filter(b => b.toLowerCase().includes(input));
            list.innerHTML = filtered.map(b => `<li onclick="selectBairro('${b}')" class="p-4 hover:bg-indigo-50 border-b border-gray-50 text-sm font-medium cursor-pointer active:bg-indigo-100">${b}</li>`).join('');
            if(filtered.length === 0) list.classList.add('hidden');
        }

        function selectBairro(val) {
            document.getElementById('bairro').value = val;
            document.getElementById('bairros-suggestions').classList.add('hidden');
        }

        // GERAR E SALVAR
        document.getElementById('qrForm').onsubmit = (e) => {
            e.preventDefault();
            
            const nomeInput = document.getElementById('cliente').value.trim();
            let existingClient = savedClientes.find(c => c.nome.toLowerCase() === nomeInput.toLowerCase());

            const data = {
                uid: existingClient ? existingClient.uid : generateUID(),
                nome: nomeInput,
                rua: document.getElementById('rua').value.trim(),
                bairro: document.getElementById('bairro').value.trim(),
                numero: document.getElementById('numero').value.trim(),
                telefone: document.getElementById('telefone').value.trim(),
                horario: document.getElementById('toggle-horario').checked ? document.getElementById('horario').value : null
            };

            // Salva ou Atualiza
            if(existingClient) {
                const idx = savedClientes.indexOf(existingClient);
                savedClientes[idx] = data;
            } else {
                savedClientes.push(data);
            }
            localStorage.setItem('saved_customers', JSON.stringify(savedClientes));

            // GERA O QR CODE COM O UID
            new QRious({
                element: document.getElementById('qrcode-canvas'),
                value: data.uid,
                size: 200,
                foreground: '#4f46e5',
                level: 'M'
            });

            document.getElementById('uid-tag').innerText = data.uid;
            document.getElementById('result-area').classList.remove('hidden');
            document.getElementById('result-area').scrollIntoView({ behavior: 'smooth' });
        };

        function resetForm() {
            document.getElementById('qrForm').reset();
            document.getElementById('result-area').classList.add('hidden');
            document.getElementById('time-container').classList.add('hidden');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        document.addEventListener('click', (e) => {
            if (e.target.id !== 'cliente') document.getElementById('clientes-suggestions').classList.add('hidden');
            if (e.target.id !== 'bairro') document.getElementById('bairros-suggestions').classList.add('hidden');
        });

        window.onload = () => {
            lucide.createIcons();
            const now = new Date();
            now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
            document.getElementById('horario').value = now.toISOString().slice(0, 16);
        };
    </script>
</body>
</html>
