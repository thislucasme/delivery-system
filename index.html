<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Delivery Unaí Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; background: #f9fafb; }
        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .animate-fade-in { animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .switch { position: relative; display: inline-block; width: 44px; height: 24px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #e2e8f0; transition: .4s; border-radius: 24px; }
        .slider:before { position: absolute; content: ""; height: 18px; width: 18px; left: 3px; bottom: 3px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #4f46e5; }
        input:checked + .slider:before { transform: translateX(20px); }

        #bairros-suggestions::-webkit-scrollbar { width: 4px; }
        #bairros-suggestions::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        body.modal-open { overflow: hidden; }
    </style>
</head>
<body class="text-gray-900 min-h-screen">

    <div id="app" class="max-w-md mx-auto min-h-screen flex flex-col pb-24">
        
        <header class="sticky top-0 z-40 glass border-b border-gray-100 px-4 py-4 flex items-center justify-between">
            <h1 class="text-xl font-black tracking-tight text-indigo-600">Entregas Unaí</h1>
            <div id="current-date-display" class="font-bold text-[10px] bg-gray-100 px-3 py-1 rounded-full uppercase">Hoje</div>
        </header>

        <main id="main-content" class="flex-1 px-4 py-4"></main>

        <button onclick="openModal('orderModal')" class="fixed bottom-6 right-6 w-16 h-16 bg-indigo-600 text-white rounded-full shadow-2xl flex items-center justify-center active:scale-90 transition-transform z-30 border-4 border-white">
            <i data-lucide="plus" class="w-8 h-8"></i>
        </button>

        <div id="orderModal" class="fixed inset-0 z-50 hidden">
            <div class="absolute inset-0 bg-black/40 backdrop-blur-sm" onclick="closeModal('orderModal')"></div>
            <div class="absolute bottom-0 left-0 right-0 bg-white rounded-t-[2.5rem] p-6 shadow-2xl overflow-y-auto max-h-[92vh] animate-fade-in">
                <div class="w-12 h-1.5 bg-gray-200 rounded-full mx-auto mb-8"></div>
                
                <div class="flex justify-between items-center mb-6">
                    <h2 class="text-2xl font-black text-gray-800">Novo Pedido</h2>
                    <button onclick="startQRScanner()" class="flex items-center gap-2 px-4 py-2.5 bg-indigo-600 text-white rounded-2xl font-bold text-xs active:scale-95 transition-all">
                        <i data-lucide="qr-code" class="w-4 h-4"></i> ESCANEAR UID
                    </button>
                </div>

                <div id="reader" class="hidden mb-6 rounded-3xl overflow-hidden border-4 border-indigo-100 bg-black aspect-square"></div>
                
                <form id="orderForm" class="space-y-4 pb-10">
                    <input type="text" id="cliente" placeholder="Nome do Cliente" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl focus:ring-2 focus:ring-indigo-500 outline-none font-bold" required>
                    <input type="text" id="rua" placeholder="Rua e Complemento" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium" required>

                    <div class="grid grid-cols-2 gap-4">
                        <input type="text" id="bairro" placeholder="Bairro" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium" required>
                        <input type="text" id="numero" placeholder="Nº" class="p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium" required>
                    </div>

                    <input type="tel" id="telefone" placeholder="WhatsApp" class="w-full p-4 bg-gray-50 border border-gray-100 rounded-2xl outline-none focus:ring-2 focus:ring-indigo-500 font-medium" required>

                    <button type="submit" class="w-full py-5 bg-indigo-600 text-white font-black text-lg rounded-2xl shadow-xl active:scale-[0.97]">CRIAR ENTREGA</button>
                </form>
            </div>
        </div>
    </div>

    <script>
        let orders = JSON.parse(localStorage.getItem('delivery_orders')) || [];
        let html5QrCode = null;

        // --- MOCK DE SEGURANÇA (Para o seu teste agora) ---
        function initMockData() {
            let saved = JSON.parse(localStorage.getItem('saved_customers')) || [];
            if (saved.length === 0) {
                // Se não tiver nada no banco do gerador, cria um mock para você testar
                const mock = [{
                    uid: "UID-TESTE123",
                    nome: "Cliente de Teste Unaí",
                    rua: "Rua Central",
                    bairro: "Centro",
                    numero: "100",
                    telefone: "3899999999"
                }];
                localStorage.setItem('saved_customers', JSON.stringify(mock));
                console.log("Banco de teste criado. Tente escanear um QR com 'UID-TESTE123'");
            }
        }

        async function startQRScanner() {
            const readerDiv = document.getElementById('reader');
            readerDiv.classList.remove('hidden');
            
            const savedCustomers = JSON.parse(localStorage.getItem('saved_customers')) || [];

            try {
                if (html5QrCode) await html5QrCode.stop();
                html5QrCode = new Html5Qrcode("reader");
                
                await html5QrCode.start(
                    { facingMode: "environment" }, 
                    { fps: 20, qrbox: { width: 250, height: 250 } }, 
                    (decodedText) => {
                        console.log("Leitura efetuada:", decodedText);
                        
                        // Busca no banco local pelo UID exato
                        const found = savedCustomers.find(c => c.uid.trim() === decodedText.trim());
                        
                        if (found) {
                            fillForm(found);
                            stopScanner();
                        } else {
                            // Se não achar o UID, tenta ver se o QR é um JSON completo
                            try {
                                const data = JSON.parse(decodedText);
                                fillForm(data);
                                stopScanner();
                            } catch (e) {
                                alert("UID não encontrado no banco local: " + decodedText);
                                stopScanner();
                            }
                        }
                    }
                );
            } catch (err) {
                alert("Erro ao abrir câmera. Verifique permissões HTTPS.");
                readerDiv.classList.add('hidden');
            }
        }

        function fillForm(data) {
            document.getElementById('cliente').value = data.nome || '';
            document.getElementById('rua').value = data.rua || '';
            document.getElementById('bairro').value = data.bairro || '';
            document.getElementById('numero').value = data.numero || '';
            document.getElementById('telefone').value = data.telefone || '';
            
            // Feedback de sucesso
            document.getElementById('orderForm').classList.add('animate-pulse');
            setTimeout(() => document.getElementById('orderForm').classList.remove('animate-pulse'), 1000);
        }

        function stopScanner() {
            if (html5QrCode) {
                html5QrCode.stop().then(() => {
                    document.getElementById('reader').classList.add('hidden');
                    html5QrCode = null;
                }).catch(() => {});
            }
        }

        function renderOrders() {
            const main = document.getElementById('main-content');
            if(orders.length === 0) {
                main.innerHTML = `<div class="flex flex-col items-center justify-center h-64 text-gray-300"><p class="font-bold">Sem entregas</p></div>`;
            } else {
                main.innerHTML = orders.map(o => `
                    <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-gray-100 mb-4">
                        <h3 class="font-black text-gray-800">${o.cliente}</h3>
                        <p class="text-sm text-gray-500">${o.rua}, ${o.numero} - ${o.bairro}</p>
                        <div class="mt-4 text-[10px] font-black uppercase text-indigo-600">${o.status}</div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        document.getElementById('orderForm').onsubmit = (e) => {
            e.preventDefault();
            orders.push({
                cliente: document.getElementById('cliente').value,
                rua: document.getElementById('rua').value,
                bairro: document.getElementById('bairro').value,
                numero: document.getElementById('numero').value,
                telefone: document.getElementById('telefone').value,
                status: 'Pendente',
                dataView: new Date().toISOString()
            });
            localStorage.setItem('delivery_orders', JSON.stringify(orders));
            closeModal('orderModal');
            renderOrders();
        };

        function openModal(id) { document.getElementById(id).classList.remove('hidden'); document.body.classList.add('modal-open'); }
        function closeModal(id) { document.getElementById(id).classList.add('hidden'); document.body.classList.remove('modal-open'); stopScanner(); }

        window.onload = () => { 
            initMockData();
            renderOrders(); 
        };
    </script>
</body>
</html>
